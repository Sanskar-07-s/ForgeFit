<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ForgeFit AI — Premium AI Fitness Ecosystem</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Elevate your physical training using ForgeFit AI. Personalized workout generator, calorie macro tracker, supplement streaker, and interactive 3D anatomy." />
    <meta name="theme-color" content="#090a0f" />
    
    <!-- Open Graph (Facebook/LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="ForgeFit AI — Startup-Quality AI Fitness Ecosystem" />
    <meta property="og:description" content="Generate workout routines, track macros, sync offline, and consult our Gemini AI fitness coach." />
    <meta property="og:image" content="/images/og-share.png" />
    
    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />

    <!-- Google Fonts: Inter & Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    
    <style>
      body {
        margin: 0;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        background-color: #090a0f;
        color: #f8fafc;
        overflow-x: hidden;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Fallback Service Worker Register -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('ForgeFit Service Worker registered successfully:', reg.scope))
            .catch(err => console.warn('Service Worker registration failed:', err));
        });
      }
    </script>
  </body>
</html>
